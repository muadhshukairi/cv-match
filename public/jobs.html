<style>
:root{
  --bg:#080612;--card:#0F0B1F;--cardH:#160F2E;
  --b:#1E1535;--b2:#2D1F4E;
  --v:#8B5CF6;--vd:#6D28D9;--vDim:rgba(139,92,246,.12);
  --g:#10B981;--gold:#F59E0B;--red:#EF4444;
  --t:#F1F5F9;--tM:#94A3B8;--tD:#475569;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'Inter',sans-serif;min-height:100vh}
body[dir="rtl"]{font-family:'Cairo',sans-serif}
a{color:inherit}

.wrap{max-width:1040px;margin:0 auto;padding:24px 20px 60px}

.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.brand-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#6D28D9,#8B5CF6);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff}
.brand-name{font-family:'Fraunces',serif;font-weight:800;font-size:17px}
.header-right{display:flex;align-items:center;gap:10px}
.lang-toggle{display:flex;border:1px solid var(--b2);border-radius:8px;overflow:hidden}
.lang-toggle button{font-size:12px;font-weight:700;padding:6px 13px;border:none;cursor:pointer;font-family:inherit;background:transparent;color:var(--tD)}
.lang-toggle button.active{background:var(--v);color:#fff}
.back-link{font-size:13px;color:var(--tM);text-decoration:none;display:flex;align-items:center;gap:4px;white-space:nowrap}

.page-title{font-family:'Fraunces',serif;font-weight:800;font-size:28px;margin-bottom:4px}
body[dir="rtl"] .page-title{font-family:'Cairo',sans-serif}
.page-sub{font-size:12.5px;color:var(--tM);margin-bottom:24px}

.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:220px;background:var(--card);border:1px solid var(--b);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px}
.search-box input{background:none;border:none;outline:none;color:var(--t);font-size:13.5px;font-family:inherit;width:100%}
.search-box input::placeholder{color:var(--tD)}
.sort-select{background:var(--card);border:1px solid var(--b);border-radius:10px;padding:10px 14px;color:var(--t);font-size:13px;font-family:inherit;cursor:pointer}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.chip{background:var(--card);border:1px solid var(--b);border-radius:999px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--tM);cursor:pointer;white-space:nowrap;font-family:inherit}
.chip.active{background:var(--v);border-color:transparent;color:#fff}
.result-count{font-size:12px;color:var(--tD);margin-bottom:16px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px}
.tile{position:relative;aspect-ratio:0.68;border-radius:12px;overflow:hidden;background:var(--card);border:1px solid var(--b)}
.tile img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;cursor:zoom-in}
.tile-info{position:absolute;left:0;right:0;bottom:0;background:rgba(8,6,18,.96);padding:8px 10px 10px;cursor:pointer}
.tile-title{font-size:11.5px;font-weight:800;color:#fff;line-height:1.25;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tile-company{font-size:9.5px;color:#c4b5fd;margin-bottom:8px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tile-badge{position:absolute;top:7px;inset-inline-end:7px;background:rgba(16,185,129,.9);color:#fff;font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:999px;backdrop-filter:blur(4px);z-index:2}
.tile-omani{position:absolute;top:7px;inset-inline-start:7px;background:rgba(5,150,105,.9);color:#fff;font-size:8px;font-weight:700;padding:2px 6px;border-radius:999px;backdrop-filter:blur(4px);z-index:2}
.tile-actions{display:flex;gap:5px}
.tile-match-btn{flex:1;background:linear-gradient(135deg,#059669,#10B981);color:#fff;border:none;border-radius:6px;padding:6px 4px;font-size:9.5px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none;text-align:center;display:block}
.tile-wa-btn{flex:0 0 26px;display:flex;align-items:center;justify-content:center;background:#25D366;border-radius:6px;text-decoration:none}
.tile-wa-btn svg{width:12px;height:12px}

.empty-state{text-align:center;padding:60px 20px;color:var(--tD);font-size:13.5px}
.loading-state{text-align:center;padding:60px 20px;color:var(--tD);font-size:13.5px}

@media(max-width:640px){
  .wrap{padding:16px 12px 40px}
  .grid{grid-template-columns:repeat(3,1fr);gap:7px}
  .tile-title{font-size:9.5px}
  .tile-company{font-size:8px;margin-bottom:6px}
  .tile-info{padding:6px 7px 8px}
  .tile-actions{gap:4px}
  .tile-match-btn{font-size:7.5px;padding:5px 3px}
  .tile-wa-btn{flex:0 0 22px}
  .tile-wa-btn svg{width:10px;height:10px}
  .page-title{font-size:22px}
  .controls{gap:8px}
}
@media(max-width:400px){
  .grid{grid-template-columns:repeat(2,1fr);gap:8px}
}
</style>

<script>
var STR = {
  en: {
    backLink:'← Back to Seerah', pageTitle:'All Jobs', searchPh:'Search by title or company...',
    sortNewest:'Newest first', sortOldest:'Oldest first',
    chipAll:'All', chipToday:'Today', chipWeek:'This week', chipMonth:'This month',
    loading:'Loading jobs…', empty:'No jobs found.', resultCount:'{n} jobs found', totalCount:'{n} total jobs published',
    matchBtn:'Upload CV to Match', omaniOnly:'Omani Only',

    waJob:function(job,applyLink){

  },
  ar: {
    backLink:'→ العودة إلى سيرة', pageTitle:'كل الوظائف', searchPh:'ابحث بالمسمى الوظيفي أو الشركة...',
    sortNewest:'الأحدث أولاً', sortOldest:'الأقدم أولاً',
    chipAll:'الكل', chipToday:'اليوم', chipWeek:'هذا الأسبوع', chipMonth:'هذا الشهر',
    loading:'جارٍ تحميل الوظائف…', empty:'لا توجد وظائف.', resultCount:'{n} وظيفة موجودة', totalCount:'{n} إجمالي الوظائف المنشورة',
    matchBtn:'ارفع سيرتك للمطابقة', omaniOnly:'عُمانيين فقط',
    wachannel:'انضم لقناة وظائف عمان على الواتساب',
    sharedaily:'شارك وظائف اليوم',
    waJob:function(job,applyLink){
      return 'المسمى الوظيفي: '+(job.title_ar||job.title_en)+
        '\nالشركة: '+(job.company||'—')+
        '\nالموقع: '+(job.location||'—')+
        '\nللتفاصيل والتقديم: '+applyLink;
    },
    waCta:'\n\nلرفع نسبة توافق سيرتك مع الوظيفة:\nhttps://www.seerah-ai.com\nhttps://www.instagram.com/seerah.ai',
  }
};

var lang = 'ar';
var ALL_JOBS = [];
var activeChip = 'all';

function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

// Same contact-normalization helper as index.html — contact can be a URL, email, or phone
function contactToUrl(contact){
  // The sheet sometimes stores a bare number (e.g. a phone number typed
  // without quotes) as a JSON number, not a string — String() coercion
  // here prevents that from throwing and breaking the whole filter/render.
  var c=String(contact==null?'':contact).trim();
  if(!c) return '';
  if(/^https?:\/\//i.test(c)) return c;
  if(/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(c)) return 'mailto:'+c;
  if(/^[+\d][\d\s()-]{5,}$/.test(c)) return 'tel:'+c.replace(/[^\d+]/g,'');
  return '';
}

// Same date-resolution logic as index.html — job IDs embed a reliable 13-digit
// publish timestamp (e.g. "J1783504111549"); the sheet's `date` column can get
// corrupted by Google Sheets' date serialization, so the ID timestamp wins
// whenever it's present and sane.
function resolveJobDate(job){
  var d = null;
  if(job.id){
    var idMatch = String(job.id).match(/(\d{13})/);
    if(idMatch){
      var ts = parseInt(idMatch[1],10);
      var candidate = new Date(ts);
      if(!isNaN(candidate.getTime()) && candidate.getFullYear()>2020 && candidate.getTime() < Date.now()+86400000){
        d = candidate;
      }
    }
  }
  if(!d){
    var raw = job.date_posted||job.posted_date||job.date||job.created_at||job.timestamp||'';
    if(!raw) return null;
    var parsed = new Date(raw);
    if(isNaN(parsed.getTime())) return null;
    d = parsed;
  }
  return d;
}
function daysAgo(job){
  var d = resolveJobDate(job);
  if(!d) return null;
  var now = new Date();
  var d0 = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var n0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var diffDays = Math.round((n0-d0)/86400000);
  return diffDays<0 ? 0 : diffDays;
}
function isExpired(job){
  if(!job.deadline) return false;
  var d = new Date(job.deadline);
  if(isNaN(d)) return false;
  return d < new Date();
}
function daysAgoLabel(job){
  var da = daysAgo(job);
  if(da===null) return '';
  if(da<=0) return lang==='ar' ? 'اليوم' : 'Today';
  if(da===1) return lang==='ar' ? 'أمس' : 'Yesterday';
  return lang==='ar' ? (da+' يوم') : (da+'d ago');
}

function setLang(l){
  lang = l;
  var s = STR[l];
  document.getElementById('root').lang = l;
  document.getElementById('root').dir = l==='ar' ? 'rtl' : 'ltr';
  document.body.dir = l==='ar' ? 'rtl' : 'ltr';
  document.body.style.fontFamily = l==='ar' ? "'Cairo',sans-serif" : "'Inter',sans-serif";
  document.getElementById('btn-ar').classList.toggle('active', l==='ar');
  document.getElementById('btn-en').classList.toggle('active', l==='en');

  document.getElementById('back-link').textContent = s.backLink;
  document.getElementById('page-title').textContent = s.pageTitle;
  document.getElementById('wachannel-lbl').textContent = s.wachannel;
  document.getElementById('share-daily-lbl').textContent = s.sharedaily;
  updateDailyShareButton();
  document.getElementById('search-input').placeholder = s.searchPh;
  document.getElementById('sort-select').innerHTML =
    '<option value="newest">'+s.sortNewest+'</option><option value="oldest">'+s.sortOldest+'</option>';
  renderChips();
  applyFilters();
}

function renderChips(){
  var s = STR[lang];
  var chips=[
    {key:'all',label:s.chipAll},
    {key:'today',label:s.chipToday},
    {key:'week',label:s.chipWeek},
    {key:'month',label:s.chipMonth},
  ];
  document.getElementById('date-chips').innerHTML = chips.map(function(c){
    return '<button class="chip'+(activeChip===c.key?' active':'')+'" onclick="selectChip(\''+c.key+'\')">'+c.label+'</button>';
  }).join('');
}
function selectChip(key){
  activeChip=key;
  renderChips();
  applyFilters();
}

var waSvg='<svg viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.004 2.003c-5.514 0-9.997 4.483-9.997 9.997 0 1.762.464 3.484 1.346 5.001L2 22l5.117-1.341a9.958 9.958 0 004.887 1.246h.004c5.514 0 9.997-4.483 9.997-9.997 0-2.67-1.04-5.18-2.929-7.069a9.935 9.935 0 00-7.072-2.929zm0 18.176a8.16 8.16 0 01-4.16-1.137l-.298-.177-3.037.796.811-2.96-.194-.304a8.15 8.15 0 01-1.253-4.39c0-4.512 3.671-8.183 8.183-8.183a8.13 8.13 0 015.789 2.398 8.13 8.13 0 012.397 5.789c0 4.512-3.674 8.185-8.185 8.185z"/></svg>';

function buildWaLink(job){
  var s = STR[lang];
  var img = job.image_thumb || '';
  var applyLink = contactToUrl(job.contact) || (lang==='ar' ? 'تواصل عبر الوظيفة المنشورة' : 'See posting for contact details');
  var msg = (img ? img+'\n\n' : '') + s.waJob(job, applyLink) + s.waCta;
  return 'https://wa.me/?text='+encodeURIComponent(msg);
}

// Same approach as index.html's Daily Jobs board share button — try
// attaching the real image as a file via the mobile share sheet first
// (guaranteed preview), falling back to the plain wa.me link (href already
// set on the <a>) everywhere that doesn't support it or if the fetch fails.
function shareJobToWhatsApp(e, jobId){
  fetch('/api/track?event=job_whatsapp_share&detail='+encodeURIComponent(jobId||'')).catch(function(){});
  var job = ALL_JOBS.find(function(j){ return j.id===jobId; });
  if(!job) return;
  var img = job.image_thumb || '';
  var s = STR[lang];
  var applyLink = contactToUrl(job.contact) || (lang==='ar' ? 'تواصل عبر الوظيفة المنشورة' : 'See posting for contact details');
  var textOnly = s.waJob(job, applyLink) + s.waCta;
  var fallbackHref = e.currentTarget.href;

  if(img && navigator.share && navigator.canShare){
    e.preventDefault();
    fetch(img).then(function(r){ return r.blob(); }).then(function(blob){
      var file = new File([blob], 'job.jpg', {type: blob.type || 'image/jpeg'});
      if(navigator.canShare({files:[file]})){
        return navigator.share({files:[file], text: textOnly});
      }
      throw new Error('file share unsupported');
    }).catch(function(err){
      if(err && err.name==='AbortError') return; // user cancelled — do nothing
      window.open(fallbackHref, '_blank', 'noopener'); // real failure — fall back to the link version
    });
  }
}

// Same digest format as index.html's "Share Today's Jobs" — bundles the
// newest 3 postings (sorted independently of whatever filter/sort the user
// currently has applied) into one structured, labeled WhatsApp message.
function updateDailyShareButton(){
  var btn=document.getElementById('share-daily-btn');
  if(!btn) return;
  if(!ALL_JOBS.length){ btn.style.display='none'; return; }
  btn.style.display='flex';

  // "Today's jobs" means everything posted today or yesterday, however many
  // that is — not a fixed count. Falls back to the 3 newest only if nothing
  // was posted in that window, so the button never points at an empty message.
  var sorted=ALL_JOBS.slice().sort(function(a,b){
    var da=resolveJobDate(a), db=resolveJobDate(b);
    return (db?db.getTime():0) - (da?da.getTime():0);
  });
  var recent=sorted.filter(function(j){ var a=daysAgo(j); return a!==null && a<=1; });
  var top3=recent.length ? recent : sorted.slice(0,3);

  var dateStr=new Date().toLocaleDateString(lang==='ar'?'ar-OM':'en-GB',{day:'numeric',month:'long'});
  var lines=[];
  lines.push(lang==='ar'
    ?'شاهد الوظائف اليومية عبر *seerah-ai.com* 📅 '+dateStr
    :"Check out today's jobs on *seerah-ai.com* 📅 "+dateStr);

  top3.forEach(function(job,i){
    var jTitle=lang==='ar'?(job.title_ar||job.title_en):(job.title_en||job.title_ar);
    var adLink='https://www.seerah-ai.com/?openJob='+encodeURIComponent(job.id);
    var applyLink=contactToUrl(job.contact)||(lang==='ar'?'تواصل عبر الوظيفة المنشورة':'See posting for contact details');
    lines.push('#'+(i+1)+' '+jTitle);
    lines.push((lang==='ar'?'الشركة: ':'Company: ')+(job.company||'—'));
    lines.push((lang==='ar'?'رابط الإعلان في سيرة: ':'Job ad link on Seerah: ')+adLink);
    lines.push('');
    lines.push((lang==='ar'?'للتواصل / التقديم: ':'Apply / Contact: ')+applyLink);
  });

  lines.push(lang==='ar'
    ?'✦ حسّن سيرتك الذاتية لرفع نسبة توافقك مع كل وظيفة'
    :'✦ Improve your CV to boost your match with each job');
  lines.push(lang==='ar'?'لمتابعة الوظائف اليومية:':'For daily job updates:');
  lines.push('*www.seerah-ai.com*');

  btn.href='https://wa.me/?text='+encodeURIComponent(lines.join('\n'));
  btn.onclick=function(){ fetch('/api/track?event=daily_digest_share').catch(function(){}); };
}

function applyFilters(){
  var s = STR[lang];
  var q = (document.getElementById('search-input').value||'').toLowerCase();
  var sort = document.getElementById('sort-select').value;

  var filtered = ALL_JOBS.filter(function(j){
    var titleEn=(j.title_en||'').toLowerCase(), titleAr=(j.title_ar||''), company=(j.company||'').toLowerCase();
    var matchesSearch = !q || titleEn.includes(q) || titleAr.includes(q) || company.includes(q);
    if(!matchesSearch) return false;
    if(activeChip==='all') return true;
    var da = daysAgo(j);
    if(da===null) return false;
    if(activeChip==='today') return da<=0;
    if(activeChip==='week') return da<=7;
    if(activeChip==='month') return da<=30;
    return true;
  });

  filtered.sort(function(a,b){
    var da=resolveJobDate(a), db=resolveJobDate(b);
    var ta = da ? da.getTime() : 0;
    var tb = db ? db.getTime() : 0;
    return sort==='oldest' ? ta-tb : tb-ta;
  });

  document.getElementById('result-count').textContent = s.resultCount.replace('{n}', filtered.length);
  document.getElementById('page-sub').textContent = s.totalCount.replace('{n}', ALL_JOBS.length);

  var grid = document.getElementById('job-grid');
  if(!filtered.length){
    grid.className='';
    grid.innerHTML = '<div class="empty-state">'+s.empty+'</div>';
    return;
  }

  grid.className='grid';
  grid.innerHTML = filtered.map(function(j){
    var title = lang==='ar' ? (j.title_ar||j.title_en) : (j.title_en||j.title_ar);
    var img = j.image_thumb || '';
    var badge = daysAgoLabel(j);
    var matchUrl = 'index.html?openJob='+encodeURIComponent(j.id);
    var waUrl = buildWaLink(j);
    return '<div class="tile">'+
      (img?'<img src="'+img+'" loading="lazy" onclick="openLightbox(\''+img+'\')">':'')+
      (badge?'<div class="tile-badge">'+esc(badge)+'</div>':'')+
      (j.omani_only?'<div class="tile-omani">'+s.omaniOnly+'</div>':'')+
      '<div class="tile-info" onclick="location.href=\''+matchUrl+'\'">'+
        '<div class="tile-title">'+esc(title)+'</div>'+
        '<div class="tile-company">'+esc(j.company||'')+'</div>'+
        '<div class="tile-actions">'+
          '<a class="tile-match-btn" href="'+matchUrl+'" onclick="event.stopPropagation()">'+s.matchBtn+'</a>'+
          '<a class="tile-wa-btn" href="'+waUrl+'" target="_blank" rel="noopener" onclick="event.stopPropagation();shareJobToWhatsApp(event,\''+j.id+'\')">'+waSvg+'</a>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function openLightbox(imgUrl){
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  var bigImg=document.createElement('img');
  bigImg.src=imgUrl;
  bigImg.style.cssText='max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)';
  overlay.appendChild(bigImg);
  overlay.addEventListener('click',function(){document.body.removeChild(overlay);});
  document.body.appendChild(overlay);
}

async function loadJobs(){
  document.getElementById('job-grid').innerHTML = '<div class="loading-state">'+STR[lang].loading+'</div>';
  try{
    var r = await fetch('/api/get-jobs');
    var d = await r.json();
    var all = (d.jobs||[]).slice().reverse();
    // Same staleness rules as the main site — hide jobs older than 30 days
    // or past their deadline, without deleting the underlying sheet rows.
    ALL_JOBS = all.filter(function(j){
      var da = daysAgo(j);
      var tooOld = (da!==null && da>30);
      return !tooOld && !isExpired(j);
    });
    setLang(lang);
  }catch(e){
    document.getElementById('job-grid').innerHTML = '<div class="empty-state">'+STR[lang].empty+'</div>';
  }
}

loadJobs();
</script>

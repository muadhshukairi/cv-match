<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Seerah AI · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#080612;color:#F1F5F9;font-family:'Inter',sans-serif;min-height:100vh;padding:32px 24px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .card{background:#0F0B1F;border:1px solid #1E1535;border-radius:16px;padding:28px;margin-bottom:20px}
  .stat-card{background:#0F0B1F;border:1px solid #1E1535;border-radius:14px;padding:24px 28px}
  .big-num{font-size:52px;font-weight:900;line-height:1;letter-spacing:-2px}
  .v{color:#8B5CF6}.g{color:#10B981}.gold{color:#F59E0B}
  .err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px 16px;font-size:13px;color:#EF4444;margin-top:12px}
  .ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:10px;padding:12px 16px;font-size:13px;color:#10B981;margin-top:12px}
  button{cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div style="max-width:900px;margin:0 auto">

  <!-- Header -->
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:28px;flex-wrap:wrap">
    <svg width="36" height="36" viewBox="0 0 44 44" fill="none">
      <defs>
        <linearGradient id="b" x1="0" y1="44" x2="44" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#0A0618"/><stop offset="100%" stop-color="#1A1040"/></linearGradient>
        <linearGradient id="r" x1="5" y1="0" x2="39" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#6D28D9"/><stop offset="48%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#10B981"/></linearGradient>
      </defs>
      <rect width="44" height="44" rx="12" fill="url(#b)"/>
      <rect x="5" y="28" width="9" height="10" rx="2.5" fill="url(#r)"/>
      <rect x="18" y="20" width="9" height="18" rx="2.5" fill="url(#r)"/>
      <rect x="31" y="10" width="9" height="28" rx="2.5" fill="url(#r)"/>
    </svg>
    <div>
      <h1 style="font-size:22px;font-weight:800">Seerah AI · Dashboard</h1>
      <div style="font-size:12px;color:#475569" id="last-updated">—</div>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:6px">
        <div id="live-dot" style="width:8px;height:8px;border-radius:50%;background:#475569"></div>
        <span id="live-txt" style="font-size:12px;color:#475569">—</span>
      </div>
      <button onclick="loadStats()" id="refresh-btn"
        style="font-size:12px;color:#94A3B8;background:#0F0B1F;border:1px solid #1E1535;border-radius:8px;padding:6px 16px">
        ↻ Refresh
      </button>
      <button onclick="testIncrement()"
        style="font-size:12px;color:#8B5CF6;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:6px 16px">
        + Test Counter
      </button>
    </div>
  </div>

  <!-- Status message -->
  <div id="status-msg"></div>

  <!-- Stat cards -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px">
    <div class="stat-card">
      <div style="font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px">📄 CVs Uploaded</div>
      <div class="big-num v" id="count-cvs">—</div>
      <div style="font-size:12px;color:#475569;margin-top:8px">Total CV uploads</div>
    </div>
    <div class="stat-card">
      <div style="font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px">🔍 Job Searches</div>
      <div class="big-num g" id="count-searches">—</div>
      <div style="font-size:12px;color:#475569;margin-top:8px">Total searches run</div>
    </div>
    <div class="stat-card">
      <div style="font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px">✦ CVs Improved</div>
      <div class="big-num gold" id="count-improved">—</div>
      <div style="font-size:12px;color:#475569;margin-top:8px">AI rewrites done</div>
    </div>
  </div>

  <!-- Funnel -->
  <div class="card">
    <h2 style="font-size:14px;font-weight:700;margin-bottom:20px">Conversion Funnel</h2>
    <div id="funnel"><div style="color:#475569;font-size:13px">Loading…</div></div>
  </div>

  <!-- Vercel -->
  <div class="card">
    <h2 style="font-size:14px;font-weight:700;margin-bottom:12px">Traffic Analytics</h2>
    <p style="font-size:13px;color:#475569;margin-bottom:16px">Visitor counts, countries and devices are tracked via Vercel Analytics.</p>
    <a href="https://vercel.com/takhfeed/seerah-ai/analytics" target="_blank"
      style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#6D28D9,#8B5CF6);color:#fff;font-size:13px;font-weight:700;padding:10px 22px;border-radius:10px;text-decoration:none">
      Open Vercel Analytics ↗
    </a>
  </div>

  <!-- Raw API response for debugging -->
  <div class="card" style="font-size:11px">
    <div style="font-weight:700;color:#475569;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">API Response (debug)</div>
    <pre id="raw-resp" style="color:#475569;white-space:pre-wrap;word-break:break-all">—</pre>
  </div>

</div>

<script>
async function loadStats() {
  var btn = document.getElementById('refresh-btn');
  btn.textContent = '↻ Loading…';
  btn.disabled = true;
  document.getElementById('status-msg').innerHTML = '';

  try {
    var r = await fetch('/api/stats');
    var text = await r.text();
    document.getElementById('raw-resp').textContent = text;

    var d = JSON.parse(text);

    if (d.error) {
      document.getElementById('status-msg').innerHTML =
        '<div class="err">⚠ ' + d.error + '</div>';
    }

    if (d.upstash_connected) {
      document.getElementById('live-dot').style.background = '#10B981';
      document.getElementById('live-txt').textContent = 'Upstash connected';
      document.getElementById('live-txt').style.color = '#10B981';
    } else {
      document.getElementById('live-dot').style.background = '#EF4444';
      document.getElementById('live-txt').textContent = 'Not connected';
      document.getElementById('live-txt').style.color = '#EF4444';
    }

    document.getElementById('count-cvs').textContent      = (d.cvs      || 0).toLocaleString();
    document.getElementById('count-searches').textContent = (d.searches  || 0).toLocaleString();
    document.getElementById('count-improved').textContent = (d.improved  || 0).toLocaleString();
    document.getElementById('last-updated').textContent   = 'Updated: ' + new Date().toLocaleTimeString();

    // Funnel
    var cvs = d.cvs || 0, searches = d.searches || 0, improved = d.improved || 0;
    var rows = [
      { label:'Uploaded CV',       val:cvs,      pct:100,                                                    col:'#8B5CF6' },
      { label:'Ran job search',    val:searches, pct:cvs>0?Math.round(searches/cvs*100):0,                  col:'#10B981' },
      { label:'Improved their CV', val:improved, pct:searches>0?Math.round(improved/searches*100):0,         col:'#F59E0B' },
    ];
    document.getElementById('funnel').innerHTML = rows.map(function(row) {
      return '<div style="display:grid;grid-template-columns:200px 1fr 60px;align-items:center;gap:16px;margin-bottom:16px">' +
        '<div><div style="font-size:11px;color:#475569;margin-bottom:3px">' + row.label + '</div>' +
        '<div style="font-size:28px;font-weight:900;color:' + row.col + ';line-height:1">' + row.val.toLocaleString() + '</div></div>' +
        '<div style="height:8px;background:#1E1535;border-radius:999px">' +
        '<div style="height:100%;width:' + Math.min(row.pct,100) + '%;background:' + row.col + ';border-radius:999px;transition:width 1s ease"></div></div>' +
        '<div style="text-align:right;font-size:18px;font-weight:800;color:' + row.col + '">' + row.pct + '%</div>' +
        '</div>';
    }).join('<div style="height:1px;background:#1E1535;margin-bottom:16px"></div>');

  } catch(e) {
    document.getElementById('status-msg').innerHTML =
      '<div class="err">❌ Failed to load stats: ' + e.message + '</div>';
    document.getElementById('raw-resp').textContent = 'Error: ' + e.message;
  } finally {
    btn.textContent = '↻ Refresh';
    btn.disabled = false;
  }
}

async function testIncrement() {
  try {
    var r = await fetch('/api/track?event=cvs');
    var text = await r.text();
    document.getElementById('raw-resp').textContent = 'track response: ' + text;
    var d = JSON.parse(text);
    if (d.ok) {
      document.getElementById('status-msg').innerHTML =
        '<div class="ok">✓ Counter incremented — new value: ' + d.value + '</div>';
      setTimeout(loadStats, 800);
    } else {
      document.getElementById('status-msg').innerHTML =
        '<div class="err">❌ Track returned ok:false — check Upstash env vars in Vercel</div>';
    }
  } catch(e) {
    document.getElementById('status-msg').innerHTML =
      '<div class="err">❌ Test failed: ' + e.message + '</div>';
  }
}

// Load on page open
loadStats();
setInterval(loadStats, 60000);
</script>
</body>
</html>

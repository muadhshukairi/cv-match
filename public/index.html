<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080612;--card:#0F0B1F;--cardH:#160F2E;--b:#1E1535;--b2:#2D1F4E;
  --v:#8B5CF6;--vd:#6D28D9;--vDim:rgba(139,92,246,.12);--vGlow:rgba(139,92,246,.28);
  --g:#10B981;--gold:#F59E0B;--red:#EF4444;
  --t:#F1F5F9;--tM:#94A3B8;--tD:#475569;
  --ff:'Inter',sans-serif;--ffa:'Cairo',sans-serif;--ffd:'Fraunces',serif;
}
body{background:var(--bg);color:var(--t);font-family:var(--ff)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes barIn{from{width:0}}
@keyframes screenIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.screen{animation:screenIn .35s ease both}
.a1{animation:fadeUp .5s .05s ease both;opacity:0}
.a2{animation:fadeUp .5s .15s ease both;opacity:0}
.a3{animation:fadeUp .5s .25s ease both;opacity:0}
.a4{animation:fadeUp .5s .35s ease both;opacity:0}
.jcard{transition:transform .2s,box-shadow .2s}
.jcard:hover{transform:translateY(-2px);box-shadow:0 16px 48px rgba(0,0,0,.55),0 0 0 1px rgba(139,92,246,.18)}
.uz{transition:border-color .2s,background .2s}
.uz:hover{border-color:var(--v)!important;background:var(--vDim)!important}
.topt{transition:border-color .15s,transform .15s;cursor:pointer}
.topt:hover{transform:scale(1.07)}
.bp{transition:transform .15s,box-shadow .15s;cursor:pointer}
.bp:hover{transform:translateY(-1px);box-shadow:0 10px 30px rgba(109,40,217,.55)!important}
.el{transition:color .15s,border-color .15s}
.el:hover{color:var(--v)!important;border-color:var(--v)!important}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
@media print{.no-print{display:none!important}body{background:#fff!important}#cv-document{box-shadow:none!important;border:none!important;border-radius:0!important}@page{margin:.55in}}

/* ── CV Template styles ── */
.tpl-executive{font-family:var(--ff);color:#1a1a2e}
.tpl-executive .cv-hdr{background:#0f1f4b;color:#fff;padding:22px 26px 16px}
.tpl-executive .cv-name{font-family:var(--ffd);font-size:24px;font-weight:800;color:#fff;letter-spacing:-.3px}
.tpl-executive .cv-role{font-size:10px;color:#C9A84C;text-transform:uppercase;letter-spacing:2px;margin-top:4px;font-weight:600}
.tpl-executive .cv-rule{height:3px;background:linear-gradient(90deg,#C9A84C,#e8c97a,#C9A84C)}
.tpl-executive .cv-body{background:#fff;padding:16px 26px 22px}
.tpl-executive .cv-st{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:2.5px;color:#0f1f4b;border-bottom:1px solid #C9A84C44;padding-bottom:4px;margin:14px 0 8px}
.tpl-executive .cv-chip{font-size:10.5px;background:#eef1f9;color:#0f1f4b;border:1px solid #c4cce8;border-radius:999px;padding:2px 9px;font-weight:600;display:inline-block;margin:0 4px 5px 0}
.tpl-executive .cv-rt{font-weight:700;font-size:12.5px;color:#0f1f4b}
.tpl-executive .cv-rm{font-size:10.5px;color:#6b7a99;margin-bottom:4px}
.tpl-executive .cv-bl{font-size:11.5px;line-height:1.65;padding-inline-start:14px}
.tpl-executive .cv-bl li{margin-bottom:2px}
.tpl-executive .cv-bl li::marker{color:#C9A84C}

.tpl-zurich .cv-rm{font-size:10.5px;color:#888;margin-bottom:4px}
.tpl-zurich .cv-bl{font-size:11.5px;line-height:1.65;padding-inline-start:14px}

.tpl-pearl .cv-chip{font-size:10.5px;background:#111;color:#fff;border-radius:4px;padding:2px 9px;display:inline-block;margin:0 4px 5px 0;font-weight:600}

.tpl-pearl .cv-rm{font-size:10.5px;color:#666;margin-bottom:4px}

.tpl-aurora{font-family:var(--ff);color:#0f2027;background:#fff}
.tpl-aurora .cv-hdr{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);padding:22px 26px 16px;border-radius:10px 10px 0 0}
.tpl-aurora .cv-name{font-family:var(--ffd);font-size:24px;font-weight:800;color:#fff}
.tpl-aurora .cv-role{font-size:10px;color:#7dd3d8;text-transform:uppercase;letter-spacing:2px;margin-top:4px}

.tpl-onyx{font-family:var(--ff);color:#e2e8f0;background:#0d1117}
.tpl-onyx .cv-hdr{background:#0d1117;padding:22px 26px 16px}
.tpl-onyx .cv-name{font-family:var(--ffd);font-size:24px;font-weight:800;color:#fff}

.tpl-sand{font-family:var(--ff);color:#2c1810;background:#fef9f0}
.tpl-sand .cv-hdr{padding:22px 24px 16px;border-bottom:1px solid #e8d8c0}
.tpl-sand .cv-name{font-family:var(--ffd);font-size:26px;font-weight:700;color:#2c1810}

.tpl-titanium .cv-name{font-family:var(--ffd);font-size:22px;font-weight:900;color:#fff}
.tpl-titanium .cv-role-pill{font-size:9.5px;background:#fff;color:#18181b;padding:4px 12px;border-radius:999px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}

<body>

<!-- HEADER -->
<header class="no-print" style="border-bottom:1px solid var(--b);padding:14px 28px;display:flex;align-items:center;gap:12px;background:rgba(8,6,18,.88);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100">
  <div style="display:flex;align-items:center;gap:10px">
    <svg width="30" height="30" viewBox="0 0 44 44" fill="none">
      <defs>
        <linearGradient id="lb" x1="0" y1="44" x2="44" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#0A0618"/><stop offset="100%" stop-color="#1A1040"/>
        </linearGradient>
        <linearGradient id="lr" x1="5" y1="0" x2="39" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#6D28D9"/><stop offset="48%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#10B981"/>
        </linearGradient>
        <filter id="lg" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="1" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/>
        </filter>
      </defs>
      <rect width="44" height="44" rx="12" fill="url(#lb)"/>
      <rect width="44" height="44" rx="12" fill="none" stroke="rgba(139,92,246,.25)" stroke-width="1"/>
      <rect x="5" y="28" width="9" height="10" rx="2.5" fill="url(#lr)" filter="url(#lg)"/>
      <rect x="18" y="20" width="9" height="18" rx="2.5" fill="url(#lr)" filter="url(#lg)"/>
      <rect x="31" y="10" width="9" height="28" rx="2.5" fill="url(#lr)" filter="url(#lg)"/>
      <circle cx="35.5" cy="8" r="2" fill="white" opacity="0.72"/>
    </svg>
    <span id="wm-en" style="font-family:'Inter',sans-serif;font-size:17px;letter-spacing:-.3px"><span style="font-weight:900;color:#fff">Seerah</span> <span style="font-weight:900;color:#8B5CF6">AI</span></span>
    <span id="wm-ar" style="font-family:'Cairo',sans-serif;font-size:17px;display:none"><span style="font-weight:900;color:#fff">سيرة</span> <span style="font-weight:900;color:#8B5CF6">AI</span></span>
  </div>
  <div id="header-right" style="margin-inline-start:auto;display:flex;align-items:center;gap:10px"></div>
  <div style="display:flex;border:1px solid var(--b2);border-radius:8px;overflow:hidden;flex-shrink:0">
    <button id="btn-en" onclick="setLang('en')" style="font-size:12px;font-weight:700;padding:5px 12px;background:var(--v);color:#fff;border:none;cursor:pointer;font-family:inherit">EN</button>
    <button id="btn-ar" onclick="setLang('ar')" style="font-size:13px;font-weight:700;padding:5px 12px;background:transparent;color:var(--tD);border:none;cursor:pointer;font-family:'Cairo',sans-serif">ع</button>
  </div>
</header>

<!-- SCREEN 1: UPLOAD -->
<main id="form-view" class="screen">
  <div style="position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:500px;background:radial-gradient(ellipse,rgba(109,40,217,.28) 0%,transparent 68%);pointer-events:none;z-index:0"></div>
  <section style="max-width:880px;margin:0 auto;padding:52px 24px 40px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;position:relative">
    <div>
      <div class="a1" style="display:inline-flex;align-items:center;gap:8px;background:var(--vDim);border:1px solid rgba(139,92,246,.3);border-radius:999px;padding:5px 16px;margin-bottom:24px">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--v);animation:pulse 2s ease infinite;flex-shrink:0"></span>
        <span id="badge-text" style="font-size:11px;color:var(--v);font-weight:700;letter-spacing:.5px"></span>
      </div>
      <h1 class="a2" style="font-family:'Fraunces',serif;font-size:46px;font-weight:900;line-height:1.06;letter-spacing:-1.5px;margin-bottom:16px">
        <span id="h1a"></span><br>
        <span id="h1b" style="background:linear-gradient(135deg,#8B5CF6,#10B981);-webkit-background-clip:text;-webkit-text-fill-color:transparent"></span>
      </h1>
      <p class="a2" id="hero-sub" style="font-size:15.5px;color:var(--tM);line-height:1.7;margin-bottom:28px;max-width:400px"></p>
      <div class="a3" style="display:flex;flex-wrap:wrap;gap:8px">
        <span id="feat1" style="font-size:12px;color:var(--tM);background:var(--card);border:1px solid var(--b);border-radius:999px;padding:5px 14px"></span>
        <span id="feat2" style="font-size:12px;color:var(--tM);background:var(--card);border:1px solid var(--b);border-radius:999px;padding:5px 14px"></span>
        <span id="feat3" style="font-size:12px;color:var(--tM);background:var(--card);border:1px solid var(--b);border-radius:999px;padding:5px 14px"></span>

    fullTime:'دوام كامل',contract:'عقد مؤقت',
    tailoredFor:'مخصّصة لـ',beforeLabel:'قبل',afterLabel:'بعد',
    originalCv:'السيرة الأصلية',rewrittenCv:'السيرة المحسّنة',improvedLbl:'محسّنة',

  }

function t(k){return (T[lang]&&T[lang][k])||T.en[k]||k;}

/* ── State ── */
var lang='en',cvText='',detectedName='',lastResult=null,currentJob=null,currentTpl='executive',tailoring=false;
var JOBS=[];        // filled by autoSearchJobs() after CV upload
var cvProfile=null; // filled by extractCVProfile() — AI-extracted
var jobsLoading=false;

/* ── Client-side match scoring (keyword overlap) ── */
function calcMatch(cv,desc){
  var cvW=new Set(cv.toLowerCase().split(/\W+/).filter(function(w){return w.length>3;}));
  var dW=(desc||'').toLowerCase().split(/\W+/).filter(function(w){return w.length>3;});
  if(!dW.length) return 40;
  var hits=dW.filter(function(w){return cvW.has(w);}).length;
  var raw=Math.round(hits/dW.length*100);
  return Math.min(Math.max(raw,15),92);
}

/* ── Days-ago badge label ── */
function daysAgoLabel(n){
  if(n===null||n===undefined) return '';
  if(n===0) return lang==='ar'?'نُشر اليوم':'Today';
  if(n===1) return lang==='ar'?'منذ يوم':'1d ago';
  if(n<7)   return lang==='ar'?'منذ '+n+' أيام':n+'d ago';
  if(n<14)  return lang==='ar'?'هذا الأسبوع':'This week';
  return lang==='ar'?'هذا الشهر':Math.floor(n/7)+'w ago';
}

/* ── Jobs sub-label ── */
function setJobsStatus(msg,loading){
  var sub=document.getElementById('jobs-sub');
  if(!sub) return;
  if(loading){
    sub.innerHTML='<span style="display:inline-flex;align-items:center;gap:6px">'+
      '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="animation:spin .7s linear infinite">'+
      '<circle cx="12" cy="12" r="9" stroke="#2D1F4E" stroke-width="3"/>'+
      '<path d="M12 3a9 9 0 0 1 9 9" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/></svg>'+
      esc(msg)+'</span>';
  } else if(msg){
    sub.innerHTML='<span style="color:var(--red)">'+esc(msg)+'</span>';
  } else {
    var n=JOBS.length;
    sub.textContent=n+' '+(lang==='ar'?'وظيفة حديثة':'live jobs')+
      ' · '+(lang==='ar'?'مرتبة حسب التوافق':'sorted by compatibility');
  }
}

/* ── Show profile tags extracted by AI ── */
function showProfileTags(profile){
  var pill=document.getElementById('profile-pill');
  if(!pill||!profile) return;
  var tags=[];
  if(profile.jobTitle)        tags.push('💼 '+profile.jobTitle);
  if(profile.yearsExperience) tags.push('📅 '+profile.yearsExperience+(lang==='ar'?' سنوات':' yrs'));
  if(profile.educationField)  tags.push('🎓 '+profile.educationField);
  (profile.certifications||[]).forEach(function(c){ tags.push('✓ '+c); });
  (profile.topSkills||[]).slice(0,3).forEach(function(s){ tags.push(s); });
  pill.innerHTML=tags.map(function(tag){
    return '<span style="font-size:11px;color:var(--tM);background:var(--card);border:1px solid var(--b);border-radius:999px;padding:3px 10px">'+esc(tag)+'</span>';
  }).join('');
}

/* ── Step 1: AI extracts structured profile from CV ── */
async function extractCVProfile(){
  setJobsStatus(lang==='ar'?'يحلّل سيرتك الذاتية بالذكاء الاصطناعي…':'Analysing your CV with AI…',true);
  var res=await fetch('/api/extract-cv',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cvText:cvText}),
  });
  if(!res.ok) throw new Error('CV extraction failed');
  return await res.json();
}

/* ── Step 2: Search jobs using extracted profile ── */
async function searchWithProfile(profile){
  var country=document.getElementById('country-select').value||'Oman';
  setJobsStatus(
    lang==='ar'?'يبحث عن وظائف في '+country+'…':'Searching for jobs in '+country+'…',
    true
  );
  var res=await fetch('/api/find-jobs',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      jobTitle: profile.jobTitle,
      skills:   profile.topSkills||[],
      country:  country,
    }),
  });
  var data=await res.json();
  if(!res.ok) throw new Error(data.error||'Job search failed');
  return data.jobs||[];
}

/* ── Main: extract then search (called after CV upload) ── */
async function autoSearchJobs(){
  if(jobsLoading) return;
  jobsLoading=true;
  JOBS=[];
  renderCards([]);
  document.getElementById('jobs-error').style.display='none';
  document.getElementById('profile-pill').innerHTML='';
  try{
    // Step 1 — extract profile
    cvProfile=await extractCVProfile();
    showProfileTags(cvProfile);
    // Step 2 — search jobs
    var raw=await searchWithProfile(cvProfile);
    if(!raw.length) throw new Error(
      lang==='ar'?'لا توجد وظائف حديثة مطابقة. جرّب دولة أخرى.':
      'No recent matching jobs found. Try a different country.'
    );
    JOBS=raw.map(function(j,i){
      var pct=calcMatch(cvText,j.desc||'');
      return {
        id:      j.id||('r'+i),
        match:   pct>=65?'high':pct>=40?'medium':'low',
        pct:     pct,
        en:      j.title||'',
        ar:      j.title||'',
        company: j.company||'',
        loc:     j.location||'',
        ten:     j.type||'Full-time',
        tar:     (j.type||'').toLowerCase().includes('contract')?'عقد مؤقت':'دوام كامل',
        url:     j.apply_link||'',
        desc:    j.desc||'',
        days_ago:j.days_ago,
      };
    }).sort(function(a,b){return b.pct-a.pct;});
    setJobsStatus('',false);
    renderCards(JOBS);
  }catch(e){
    JOBS=[];
    setJobsStatus('',false);
    var errEl=document.getElementById('jobs-error');
    errEl.textContent=e.message;
    errEl.style.display='';
    renderCards([]);
  }finally{
    jobsLoading=false;
  }
}

/* ── Country change re-runs search with cached profile ── */
function onCountryChange(){
  if(!cvProfile) return;
  if(jobsLoading) return;
  jobsLoading=true;
  JOBS=[];
  renderCards([]);
  document.getElementById('jobs-error').style.display='none';
  searchWithProfile(cvProfile).then(function(raw){
    if(!raw.length){
      setJobsStatus('',false);
      renderCards([]);
      return;
    }
    JOBS=raw.map(function(j,i){
      var pct=calcMatch(cvText,j.desc||'');
      return {
        id:j.id||('r'+i),match:pct>=65?'high':pct>=40?'medium':'low',pct:pct,
        en:j.title||'',ar:j.title||'',company:j.company||'',loc:j.location||'',
        ten:j.type||'Full-time',tar:(j.type||'').toLowerCase().includes('contract')?'عقد مؤقت':'دوام كامل',
        url:j.apply_link||'',desc:j.desc||'',days_ago:j.days_ago,
      };
    }).sort(function(a,b){return b.pct-a.pct;});
    setJobsStatus('',false);
    renderCards(JOBS);
  }).catch(function(e){
    setJobsStatus('',false);
    var errEl=document.getElementById('jobs-error');
    errEl.textContent=e.message;
    errEl.style.display='';
  }).finally(function(){ jobsLoading=false; });
}

/* ── File upload ── */
document.getElementById('file-input').addEventListener('change',async function(e){
  var file=e.target.files[0]; if(!file) return;
  document.getElementById('upload-label').textContent=t('uploadReading');
  document.getElementById('error-box').style.display='none';
  try{
    var name=file.name.toLowerCase(),txt='';
    if(name.endsWith('.pdf')){
      var buf=await file.arrayBuffer();
      var pdf=await pdfjsLib.getDocument({data:buf}).promise;
      for(var i=1;i<=pdf.numPages;i++){
        var pg=await pdf.getPage(i);
        var ct=await pg.getTextContent();
        txt+=ct.items.map(function(x){return x.str;}).join(' ')+'\n';
      }
    }else if(name.endsWith('.docx')){
      var ab=await file.arrayBuffer();
      var r=await mammoth.extractRawText({arrayBuffer:ab});
      txt=r.value;
    }else if(name.endsWith('.txt')){
      txt=await file.text();
    }else{throw new Error(t('errFile'));}
    cvText=txt.trim();
    if(!cvText) throw new Error(t('errFile'));
    detectedName=detectName(cvText);
    document.getElementById('upload-label').textContent=file.name+' ✓'+(detectedName?' ('+detectedName+')':'');
    cvProfile=null; JOBS=[];
    setTimeout(function(){showJobs();},500);
  }catch(err){
    document.getElementById('error-box').textContent=err.message||t('errFile');
    document.getElementById('error-box').style.display='';
    document.getElementById('upload-label').textContent=t('uploadLabel');
  }
});

function detectName(tx){
  var lines=tx.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  for(var i=0;i<Math.min(5,lines.length);i++){
    var l=lines[i];
    if(l.length<50&&/^[\u0600-\u06FFA-Z][\u0600-\u06FFa-z]+(\s+[\u0600-\u06FFA-Za-z][a-zA-Z\u0600-\u06FF'-]+){1,3}$/.test(l)) return l;
  }
  return '';
}

function useSample(){
  cvText=lang==='ar'?SAMPLE_AR:SAMPLE_EN;

  cvProfile=null; JOBS=[];
  showJobs();
}

/* ── Job cards ── */


function renderCards(jobs){
  var wrap=document.getElementById('job-cards');
  if(!jobs.length){wrap.innerHTML='<p style="color:var(--tD);text-align:center;padding:40px 0;font-size:14px">'+t('noJobs')+'</p>';return;}
  wrap.innerHTML='';
  jobs.forEach(function(j,idx){
    var acL=j.match==='high'?'#10B981':j.match==='medium'?'#F59E0B':'#EF4444';
    var grad=j.match==='high'?'linear-gradient(90deg,#6D28D9,#10B981)':j.match==='medium'?'linear-gradient(90deg,#6D28D9,#F59E0B)':'linear-gradient(90deg,#6D28D9,#EF4444)';
    var title=lang==='ar'?j.ar:j.en;
    var type=lang==='ar'?j.tar:j.ten;
    var fitLbl=j.match==='high'?t('fitHigh'):j.match==='medium'?t('fitMed'):t('fitLow');
    var isTailoring=tailoring===j.id;
    var d=document.createElement('div');
    d.className='jcard';
    d.style.cssText='background:var(--card);border:1px solid var(--b);border-radius:14px;overflow:hidden;display:grid;grid-template-columns:4px 1fr auto;margin-bottom:10px;animation:fadeUp .4s '+(idx*.05)+'s ease both;opacity:0';
    d.innerHTML=
      '<div style="background:'+acL+';opacity:.75"></div>'+
      '<div style="padding:16px 18px">'+
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:5px;flex-wrap:wrap">'+
          '<span style="font-weight:700;font-size:14.5px;color:var(--t)">'+esc(title)+'</span>'+
          '<span style="font-size:10.5px;color:var(--tD);background:var(--cardH);border:1px solid var(--b);border-radius:999px;padding:2px 8px">'+esc(type)+'</span>'+
          (j.days_ago!==null&&j.days_ago!==undefined?'<span style="font-size:10.5px;color:var(--g);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:999px;padding:2px 8px;font-weight:600">'+esc(daysAgoLabel(j.days_ago))+'</span>':'')+
        '</div>'+
        '<div style="font-size:12.5px;color:var(--tM);margin-bottom:12px">'+esc(j.company)+' · '+esc(j.loc)+'</div>'+
        '<div>'+
          '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:11px;color:var(--tD);font-weight:500">'+t('compLabel')+'</span><span style="font-size:11.5px;font-weight:700;color:'+acL+'">'+j.pct+'% · '+fitLbl+'</span></div>'+
          '<div style="height:4px;background:var(--b);border-radius:999px"><div style="height:100%;width:'+j.pct+'%;background:'+grad+';border-radius:999px;box-shadow:0 0 8px '+acL+'55;animation:barIn .9s cubic-bezier(.4,0,.2,1) both"></div></div>'+
        '</div>'+
      '</div>'+
      '<div style="padding:16px 16px 16px 0;display:flex;flex-direction:column;gap:8px;justify-content:center;align-items:flex-end">'+
        '<a href="'+esc(j.url)+'" target="_blank" rel="noopener" style="font-size:12px;font-weight:500;color:var(--tM);border:1px solid var(--b);border-radius:8px;padding:6px 12px;text-decoration:none;font-family:inherit;white-space:nowrap">'+t('viewBtn')+'</a>'+
        '<button id="tb-'+j.id+'" class="bp" onclick="doTailor(\''+j.id+'\')" '+(tailoring?'disabled':'')+' style="font-size:12.5px;font-weight:700;color:#fff;background:'+(isTailoring?'#6D28D9':'linear-gradient(135deg,#6D28D9,#8B5CF6)')+';border:none;border-radius:8px;padding:7px 14px;display:flex;align-items:center;gap:6px;white-space:nowrap;font-family:inherit;opacity:'+(tailoring&&!isTailoring?.5:1)+'">'+
          (isTailoring?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="animation:spin .7s linear infinite"><circle cx="12" cy="12" r="9" stroke="#2D1F4E" stroke-width="3"/><path d="M12 3a9 9 0 0 1 9 9" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/></svg> '+t('tailoringBtn'):t('tailorBtn'))+
        '</button>'+
      '</div>';
    wrap.appendChild(d);
  });
}

/* ── AI generate ── */
async function doTailor(jobId){
  var job=JOBS.find(function(j){return j.id===jobId;});
  if(!job||tailoring) return;
  if(!cvText){alert(t('errUpload'));return;}
  tailoring=jobId; currentJob=job;
  renderCards(JOBS);
  document.getElementById('jobs-error').style.display='none';
  try{
    var res=await fetch('/api/generate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({cvText:cvText,jobDescription:job.desc,country:document.getElementById('country-select').value,level:'senior',language:lang}),
    });
    var data=await res.json();
    if(!res.ok) throw new Error(data.error||t('errFail'));
    lastResult=data; currentTpl='executive';
    renderResult(data);
    showResult();
  }catch(err){
    var errEl=document.getElementById('jobs-error');
    errEl.textContent=err.message||t('errFail');
    errEl.style.display='';
    tailoring=false; renderCards(JOBS);
  }
}

/* ── Render result ── */
function renderResult(data){
  var cv=data.generated_cv||{};
  var job=currentJob;
  applyText();
  // Banner
  document.getElementById('banner-title').textContent=lang==='ar'?job.ar:job.en;
  document.getElementById('banner-meta').textContent=job.company+' · '+job.loc;
  var acL=job.match==='high'?'#10B981':job.match==='medium'?'#F59E0B':'#EF4444';
  var grad=job.match==='high'?'linear-gradient(90deg,#6D28D9,#10B981)':job.match==='medium'?'linear-gradient(90deg,#6D28D9,#F59E0B)':'linear-gradient(90deg,#6D28D9,#EF4444)';
  var fitLbl=job.match==='high'?t('fitHigh'):job.match==='medium'?t('fitMed'):t('fitLow');
  document.getElementById('banner-fitbar').innerHTML=
    '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:11px;color:var(--tD);font-weight:500">'+t('compLabel')+'</span><span style="font-size:11.5px;font-weight:700;color:'+acL+'">'+job.pct+'% · '+fitLbl+'</span></div>'+
    '<div style="height:4px;background:var(--b);border-radius:999px"><div style="height:100%;width:'+job.pct+'%;background:'+grad+';border-radius:999px;animation:barIn .9s cubic-bezier(.4,0,.2,1) both"></div></div>';
  // Scores
  var before=data.match_score||0,after=data.improved_match_score||before;
  setRing('ring-before','score-before',before,false);
  setRing('ring-after','score-after',after,true);
  // CTA heading
  var ctaHdEl=document.getElementById('cta-hd');
  if(ctaHdEl) ctaHdEl.textContent=lang==='ar'?'مستعد للتقديم في '+job.company+'؟':'Ready to apply to '+job.company+'?';
  // Keywords
  var mkCard=document.getElementById('keywords-card');
  var mkList=document.getElementById('keywords-list');
  mkList.innerHTML='';
  if(data.missing_keywords&&data.missing_keywords.length){
    mkCard.style.display='';
    data.missing_keywords.forEach(function(k){
      var sp=document.createElement('span');
      sp.style.cssText='font-size:12px;background:rgba(245,158,11,.1);color:var(--gold);border:1px solid rgba(245,158,11,.3);border-radius:999px;padding:3px 12px';
      sp.textContent=k; mkList.appendChild(sp);
    });
  }else{mkCard.style.display='none';}
  // Cover + IQ
  document.getElementById('cover-text').textContent=data.cover_letter||'';
  var iqEl=document.getElementById('iq-list');
  iqEl.innerHTML='';
  (data.interview_questions||[]).forEach(function(q){
    var li=document.createElement('li');
    li.style.cssText='font-size:12px;line-height:1.65;color:var(--tM);margin-bottom:8px';
    li.textContent=q; iqEl.appendChild(li);
  });
  // Template picker + document
  buildTplPicker();
  buildCVDoc(currentTpl);
  tailoring=false;
}

function setRing(rid,nid,score,glow){
  var c=score>=75?'#10B981':score>=50?'#F59E0B':'#EF4444';
  var r=document.getElementById(rid);
  r.style.background='conic-gradient('+c+' '+(score*3.6)+'deg,var(--b) 0deg)';
  if(glow) r.style.boxShadow='0 0 22px '+c+'44';
  var n=document.getElementById(nid);
  n.textContent=score; n.style.color=c;
}

/* ── Template picker ── */
function buildTplPicker(){
  var el=document.getElementById('tpl-picker');
  el.innerHTML='';
  TPLS.forEach(function(tpl){
    var btn=document.createElement('div');
    btn.className='topt';
    btn.style.cssText='flex-shrink:0;border-radius:10px;border:2px solid '+(currentTpl===tpl.id?'var(--v)':'var(--b)')+';overflow:hidden;background:var(--card);box-shadow:'+(currentTpl===tpl.id?'0 4px 20px var(--vGlow)':'none');
    btn.innerHTML=
      '<div style="width:62px;height:48px;background:'+tpl.hBg+';padding:6px 7px;display:flex;flex-direction:column;gap:2.5px">'+
        '<div style="height:5px;background:'+tpl.acct+';border-radius:2px;width:65%;opacity:.9"></div>'+
        '<div style="height:2.5px;background:'+tpl.acct+'44;border-radius:1px;width:100%"></div>'+
        '<div style="height:2px;background:rgba(150,150,150,.2);border-radius:1px;width:80%"></div>'+
      '</div>'+
      '<div style="padding:4px 5px 5px;background:var(--card)">'+

        '<div style="font-size:8.5px;color:#2D3748">'+tpl.sub+'</div>'+
      '</div>';
    btn.addEventListener('click',function(){currentTpl=tpl.id;buildTplPicker();buildCVDoc(tpl.id);});
    el.appendChild(btn);

}

/* ── CV document ── */
function buildCVDoc(tplId){
  if(!lastResult) return;
  var cv=lastResult.generated_cv||{};
  var isAr=lang==='ar';
  var doc=document.getElementById('cv-document');
  doc.className='tpl-'+tplId+(isAr?' cv-arabic':'');
  if(isAr) doc.setAttribute('dir','rtl'); else doc.removeAttribute('dir');
  var nm=detectedName||(isAr?'الاسم':'Your Name');
  var role='';
  if(cv.experience&&cv.experience[0]) role=(cv.experience[0].title||'').split(/[-–—/|]/)[0].trim();
  var skills=buildSkills(cv.skills||[],tplId);
  var exp=buildExp(cv.experience||[]);
  var edu=cv.education&&cv.education.length?cv.education.map(function(e){return '<p style="font-size:11.5px;margin-bottom:2px">'+esc(e)+'</p>';}).join(''):'';
  var body=
    '<div class="cv-st">'+t('cvSummary')+'</div>'+
    '<p style="font-size:12px;line-height:1.7;opacity:.85;margin-bottom:4px">'+esc(cv.professional_summary||'')+'</p>'+
    '<div class="cv-st">'+t('cvSkills')+'</div>'+skills+
    '<div class="cv-st">'+t('cvExp')+'</div>'+exp+
    (edu?'<div class="cv-st">'+t('cvEdu')+'</div>'+edu:'');
  if(tplId==='zurich'){
    doc.innerHTML='<div class="cv-bar"></div><div class="cv-inner"><div class="cv-name">'+esc(nm)+'</div>'+(role?'<div class="cv-role">'+esc(role)+'</div>':'')+'<div class="cv-rule"></div>'+body+'</div>';
    return;
  }
  if(tplId==='slate'){
    doc.innerHTML=
      '<div class="cv-sidebar"><div class="cv-name">'+esc(nm)+'</div>'+(role?'<div class="cv-role">'+esc(role)+'</div>':'')+'<div class="cv-rule"></div>'+
      '<div class="cv-st-side">'+t('cvSkills')+'</div>'+(cv.skills||[]).map(function(s){return '<span class="cv-chip-side">· '+esc(s)+'</span>';}).join('')+
      (edu?'<div class="cv-st-side" style="margin-top:14px">'+t('cvEdu')+'</div>'+edu:'')+'</div>'+
      '<div class="cv-main"><div class="cv-st">'+t('cvSummary')+'</div><p style="font-size:12px;line-height:1.7;opacity:.85;margin-bottom:4px">'+esc(cv.professional_summary||'')+'</p>'+
      '<div class="cv-st">'+t('cvExp')+'</div>'+exp+'</div>';
    return;
  }
  if(tplId==='titanium'){
    doc.innerHTML='<div class="cv-hdr"><div class="cv-name">'+esc(nm)+'</div>'+(role?'<span class="cv-role-pill">'+esc(role)+'</span>':'')+'</div><div class="cv-rule"></div><div class="cv-body">'+body+'</div>';
    return;
  }
  if(tplId==='ember'||tplId==='sand'){
    doc.innerHTML='<div class="cv-hdr"><div class="cv-name">'+esc(nm)+'</div>'+(role?'<div class="cv-role">'+esc(role)+'</div>':'')+'</div><div class="cv-body">'+body+'</div>';
    return;
  }
  // Default
  doc.innerHTML='<div class="cv-hdr" style="border-radius:10px 10px 0 0"><div class="cv-name">'+esc(nm)+'</div>'+(role?'<div class="cv-role">'+esc(role)+'</div>':'')+'</div><div class="cv-rule"></div><div class="cv-body">'+body+'</div>';
}

function buildSkills(skills,tplId){
  if(!skills.length) return '';
  if(tplId==='zurich'||tplId==='sand') return '<p class="cv-plain">'+skills.map(esc).join('  ·  ')+'</p>';
  return '<div style="display:flex;flex-wrap:wrap">'+skills.map(function(s){return '<span class="cv-chip">'+esc(s)+'</span>';}).join('')+'</div>';
}

function buildExp(exp){
  return exp.map(function(r){
    return '<div style="margin-bottom:12px">'+
      '<div class="cv-rt">'+esc(r.title||'')+' — '+esc(r.company||'')+'</div>'+
      '<div class="cv-rm">'+esc(r.dates||'')+'</div>'+
      '<ul class="cv-bl">'+(r.bullets||[]).map(function(b){return '<li>'+esc(b)+'</li>';}).join('')+'</ul>'+
    '</div>';
  }).join('');
}

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

/* ── Init ── */
applyText();
